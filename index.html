<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS & TS Interactive Academy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-mode">
    <div class="toolbar">
        <button id="theme-toggle" class="toolbar-btn">🌙</button>
        <button id="lang-toggle" class="toolbar-btn">EN</button>
    </div>

    <div class="app-wrapper">
        <div id="language-screen" class="view-screen">
            <h1 class="menu-title" id="lng-dir-title">აირჩიეთ მიმართულება</h1>
            <div class="selection-grid">
                <button class="menu-card-btn js-theme" data-lang="js">
                    <span class="icon">JS</span>
                    <h2>JavaScript</h2>
                    <p id="lng-js-desc">საფუძვლები, DOM API და ასინქრონული ოპერაციები</p>
                </button>
                <button class="menu-card-btn ts-theme" data-lang="ts">
                    <span class="icon">TS</span>
                    <h2>TypeScript</h2>
                    <p id="lng-ts-desc">ტიპების უსაფრთხოება და კონფიგურაცია</p>
                </button>
            </div>
        </div>

        <div id="mode-screen" class="view-screen hidden">
            <h1 class="menu-title" id="lng-mode-title">აირჩიეთ რეჟიმი</h1>
            <div class="selection-grid">
                <button class="mode-btn" data-mode="flashcards">
                    <h2 id="lng-mode-fc">Flashcards</h2>
                    <p id="lng-mode-fc-desc">ისწავლეთ საკითხები ბარათების გადატრიალებით</p>
                </button>
                <button class="mode-btn" data-mode="quiz">
                    <h2 id="lng-mode-qz">Quiz Mode</h2>
                    <p id="lng-mode-qz-desc">შეამოწმეთ ცოდნა 20-კითხვიან ქვიზში</p>
                </button>
            </div>
            <button id="back-to-lang" class="back-link-center">← უკან</button>
        </div>

        <div id="level-screen" class="view-screen hidden">
            <h1 class="menu-title" id="lng-level-title">აირჩიეთ კომპონენტი</h1>
            <div class="level-options-container"></div>
            <button id="back-to-mode" class="back-link-center">← უკან</button>
        </div>

        <div id="card-screen" class="view-screen hidden">
            <div class="card-layout">
                <div class="card-meta">
                    <span id="card-category" class="category-badge">JS Core</span>
                    <div class="progress-container">
                        <div class="progress-bar-bg">
                            <div id="progress-fill" class="progress-bar-fill"></div>
                        </div>
                        <span id="progress-text" class="progress-counter">0 / 0</span>
                    </div>
                </div>

                <div id="flashcard" class="flashcard-box">
                    <div class="card-face face-front">
                        <p id="card-question" class="text-content">კითხვა ჩაიტვირთება...</p>
                        <span id="lng-hint" class="action-hint">დააწკაპუნეთ პასუხისთვის</span>
                    </div>
                    <div class="card-face face-back">
                        <p id="card-answer" class="text-content">პასუხი ჩაიტვირთება...</p>
                        <button id="details-btn" class="modal-trigger-btn">ვრცლად განმარტება</button>
                    </div>
                </div>

                <div class="navigation-controls">
                    <button id="prev-btn" class="control-arrow">&larr;</button>
                    <button id="back-to-levels-fc" class="back-link-center">მენიუ</button>
                    <button id="next-btn" class="control-arrow">&rarr;</button>
                </div>
            </div>
        </div>

        <div id="quiz-screen" class="view-screen hidden">
            <main class="quiz-layout">
                <header class="quiz-header">
                    <span id="quiz-card-category" class="category-badge">Quiz Category</span>
                    <div class="progress-container">
                        <div class="progress-bar-bg">
                            <div id="quiz-progress-fill" class="progress-bar-fill"></div>
                        </div>
                        <span id="quiz-progress-text" class="progress-counter">1 / 20</span>
                    </div>
                </header>

                <section class="quiz-body">
                    <h2 id="quiz-question-text" class="quiz-prompt">აქ გამოჩნდება ქვიზის კითხვა?</h2>
                    <div id="quiz-options-container" class="options-stack"></div>
                </section>

                <div class="quiz-footer">
                    <button id="quiz-next-btn" class="control-arrow hidden">შემდეგი &rarr;</button>
                    <button id="back-to-levels-qz" class="back-link-center">← მენიუ</button>
                </div>
            </main>
        </div>

        <div id="quiz-result-screen" class="view-screen hidden">
            <h1 class="menu-title" id="lng-res-title">ქვიზის შედეგი</h1>
            <div class="result-score-box">
                <span id="result-score-display">0 / 20</span>
            </div>
            <div class="selection-grid">
                <button id="retry-same-btn" class="menu-card-btn">
                    <h2 id="lng-retry-title">იგივე კითხვები</h2>
                </button>
                <button id="start-new-btn" class="menu-card-btn">
                    <h2 id="lng-new-title">ახალი კითხვები</h2>
                </button>
                <button id="back-to-menu-btn" class="back-link-center">← მენიუში დაბრუნება</button>
            </div>
        </div>
    </div>

    <div class="backdrop" id="modal-backdrop">
        <div class="modal-box">
            <div class="modal-header">
                <h3 class="modal-heading" id="lng-modal-title">საკითხის დეტალური ახსნა</h3>
                <button class="dismiss-modal" id="close-modal">&times;</button>
            </div>
            <div class="modal-body">
                <p id="modal-text" class="modal-description"></p>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
